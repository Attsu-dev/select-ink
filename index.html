<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>謎解きセレクター</title>
  <style>
    :root {
      --bg: #fff8e8;
      --ink: #262338;
      --muted: #746b82;
      --panel: #ffffff;
      --line: #eadfc6;
      --easy: #20b486;
      --easy-soft: #ddf8ef;
      --norm: #3478f6;
      --norm-soft: #e6efff;
      --hell: #ef476f;
      --hell-soft: #ffe4eb;
      --shadow: 0 16px 40px rgba(38, 35, 56, 0.12);
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      color: var(--ink);
      font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background:
        radial-gradient(circle at 12% 8%, rgba(32, 180, 134, 0.22), transparent 30%),
        radial-gradient(circle at 88% 14%, rgba(239, 71, 111, 0.2), transparent 28%),
        linear-gradient(135deg, #fff8e8 0%, #f4fbff 55%, #fff1f5 100%);
    }

    .page {
      width: min(1120px, calc(100% - 32px));
      margin: 0 auto;
      padding: 32px 0;
    }

    header {
      display: flex;
      align-items: end;
      justify-content: space-between;
      gap: 24px;
      margin-bottom: 22px;
    }

    h1 {
      margin: 0;
      font-size: clamp(2rem, 4vw, 3.4rem);
      line-height: 1.05;
      letter-spacing: 0;
    }

    .lead {
      margin: 10px 0 0;
      color: var(--muted);
      font-size: 1rem;
      line-height: 1.7;
    }

    .legend {
      display: flex;
      flex-wrap: wrap;
      justify-content: flex-end;
      gap: 8px;
      min-width: 250px;
    }

    .badge {
      display: inline-flex;
      align-items: center;
      gap: 7px;
      padding: 8px 10px;
      border-radius: 999px;
      background: rgba(255, 255, 255, 0.72);
      border: 1px solid rgba(38, 35, 56, 0.1);
      font-size: 0.82rem;
      font-weight: 800;
    }

    .badge::before {
      content: "";
      width: 10px;
      height: 10px;
      border-radius: 50%;
      background: currentColor;
    }

    .easy-text { color: var(--easy); }
    .norm-text { color: var(--norm); }
    .hell-text { color: var(--hell); }

    main {
      display: grid;
      grid-template-columns: minmax(0, 1fr) minmax(320px, 0.9fr);
      gap: 24px;
      align-items: start;
    }

    .question-list {
      display: grid;
      gap: 14px;
    }

    .question {
      background: rgba(255, 255, 255, 0.78);
      border: 1px solid rgba(234, 223, 198, 0.9);
      border-radius: 8px;
      padding: 18px;
      box-shadow: 0 8px 22px rgba(38, 35, 56, 0.07);
    }

    .question-title {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      margin-bottom: 14px;
      font-weight: 900;
      font-size: 1.1rem;
    }

    .question-title span {
      color: var(--muted);
      font-size: 0.82rem;
      font-weight: 700;
    }

    .buttons {
      display: grid;
      grid-template-columns: repeat(3, minmax(0, 1fr));
      gap: 10px;
    }

    button {
      appearance: none;
      border: 0;
      border-radius: 8px;
      min-height: 74px;
      padding: 10px;
      color: var(--ink);
      cursor: pointer;
      font: inherit;
      text-align: left;
      box-shadow: inset 0 0 0 1px rgba(38, 35, 56, 0.08);
      transition: transform 140ms ease, box-shadow 140ms ease, filter 140ms ease;
    }

    button:hover {
      transform: translateY(-2px);
      box-shadow: inset 0 0 0 2px currentColor, 0 12px 22px rgba(38, 35, 56, 0.12);
      filter: saturate(1.08);
    }

    button:focus-visible {
      outline: 3px solid currentColor;
      outline-offset: 3px;
    }

    button.active {
      box-shadow: inset 0 0 0 3px currentColor, 0 14px 28px rgba(38, 35, 56, 0.18);
      transform: translateY(-2px);
    }

    .easy {
      color: var(--easy);
      background: var(--easy-soft);
    }

    .norm {
      color: var(--norm);
      background: var(--norm-soft);
    }

    .hell {
      color: var(--hell);
      background: var(--hell-soft);
    }

    .button-number {
      display: block;
      color: var(--ink);
      font-size: 1.65rem;
      line-height: 1;
      font-weight: 950;
    }

    .button-label {
      display: block;
      margin-top: 8px;
      font-size: 0.78rem;
      font-weight: 900;
      letter-spacing: 0;
    }

    .viewer {
      position: sticky;
      top: 24px;
      overflow: hidden;
      border-radius: 8px;
      background: var(--panel);
      border: 1px solid rgba(234, 223, 198, 0.95);
      box-shadow: var(--shadow);
    }

    .viewer-head {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      padding: 14px 16px;
      border-bottom: 1px solid var(--line);
      background: rgba(255, 255, 255, 0.84);
    }

    .selected-title {
      margin: 0;
      font-size: 1rem;
      font-weight: 900;
    }

    .selected-file {
      color: var(--muted);
      font-size: 0.86rem;
      font-weight: 700;
    }

    .image-box {
      display: grid;
      place-items: center;
      min-height: 430px;
      padding: 18px;
      background:
        linear-gradient(45deg, rgba(38, 35, 56, 0.045) 25%, transparent 25%),
        linear-gradient(-45deg, rgba(38, 35, 56, 0.045) 25%, transparent 25%),
        linear-gradient(45deg, transparent 75%, rgba(38, 35, 56, 0.045) 75%),
        linear-gradient(-45deg, transparent 75%, rgba(38, 35, 56, 0.045) 75%);
      background-position: 0 0, 0 10px, 10px -10px, -10px 0;
      background-size: 20px 20px;
    }

    #puzzleImage {
      display: none;
      width: 100%;
      max-height: 72vh;
      object-fit: contain;
      border-radius: 6px;
      background: #fff;
    }

    .empty {
      display: grid;
      place-items: center;
      width: 100%;
      min-height: 240px;
      padding: 24px;
      border: 2px dashed rgba(116, 107, 130, 0.36);
      border-radius: 8px;
      color: var(--muted);
      text-align: center;
      line-height: 1.7;
      background: rgba(255, 255, 255, 0.72);
    }

    .empty strong {
      display: block;
      margin-bottom: 6px;
      color: var(--ink);
      font-size: 1.1rem;
    }

    @media (max-width: 860px) {
      header {
        display: block;
      }

      .legend {
        justify-content: flex-start;
        min-width: 0;
        margin-top: 18px;
      }

      main {
        grid-template-columns: 1fr;
      }

      .viewer {
        position: static;
      }
    }

    @media (max-width: 520px) {
      .page {
        width: min(100% - 20px, 1120px);
        padding: 20px 0;
      }

      .question {
        padding: 14px;
      }

      .buttons {
        gap: 8px;
      }

      button {
        min-height: 68px;
        padding: 9px;
      }

      .button-number {
        font-size: 1.35rem;
      }

      .button-label {
        font-size: 0.7rem;
      }

      .image-box {
        min-height: 320px;
        padding: 12px;
      }
    }
  </style>
</head>
<body>
  <div class="page">
    <header>
      <div>
        <h1>謎解きセレクター</h1>
        <p class="lead">問題番号と難易度を選ぶと、対応する画像が表示されます。</p>
      </div>
      <div class="legend" aria-label="難易度の色分け">
        <span class="badge easy-text">EASY</span>
        <span class="badge norm-text">NORM</span>
        <span class="badge hell-text">HELL</span>
      </div>
    </header>

    <main>
      <section class="question-list" aria-label="問題一覧">
        <article class="question">
          <div class="question-title">1問目 <span>1 - 3</span></div>
          <div class="buttons">
            <button class="easy" type="button" data-number="1" data-difficulty="EASY">
              <span class="button-number">1</span>
              <span class="button-label">EASY</span>
            </button>
            <button class="norm" type="button" data-number="2" data-difficulty="NORM">
              <span class="button-number">2</span>
              <span class="button-label">NORM</span>
            </button>
            <button class="hell" type="button" data-number="3" data-difficulty="HELL">
              <span class="button-number">3</span>
              <span class="button-label">HELL</span>
            </button>
          </div>
        </article>

        <article class="question">
          <div class="question-title">2問目 <span>4 - 6</span></div>
          <div class="buttons">
            <button class="easy" type="button" data-number="4" data-difficulty="EASY">
              <span class="button-number">4</span>
              <span class="button-label">EASY</span>
            </button>
            <button class="norm" type="button" data-number="5" data-difficulty="NORM">
              <span class="button-number">5</span>
              <span class="button-label">NORM</span>
            </button>
            <button class="hell" type="button" data-number="6" data-difficulty="HELL">
              <span class="button-number">6</span>
              <span class="button-label">HELL</span>
            </button>
          </div>
        </article>

        <article class="question">
          <div class="question-title">3問目 <span>7 - 9</span></div>
          <div class="buttons">
            <button class="easy" type="button" data-number="7" data-difficulty="EASY">
              <span class="button-number">7</span>
              <span class="button-label">EASY</span>
            </button>
            <button class="norm" type="button" data-number="8" data-difficulty="NORM">
              <span class="button-number">8</span>
              <span class="button-label">NORM</span>
            </button>
            <button class="hell" type="button" data-number="9" data-difficulty="HELL">
              <span class="button-number">9</span>
              <span class="button-label">HELL</span>
            </button>
          </div>
        </article>

        <article class="question">
          <div class="question-title">4問目 <span>10 - 12</span></div>
          <div class="buttons">
            <button class="easy" type="button" data-number="10" data-difficulty="EASY">
              <span class="button-number">10</span>
              <span class="button-label">EASY</span>
            </button>
            <button class="norm" type="button" data-number="11" data-difficulty="NORM">
              <span class="button-number">11</span>
              <span class="button-label">NORM</span>
            </button>
            <button class="hell" type="button" data-number="12" data-difficulty="HELL">
              <span class="button-number">12</span>
              <span class="button-label">HELL</span>
            </button>
          </div>
        </article>
      </section>

      <aside class="viewer" aria-live="polite">
        <div class="viewer-head">
          <p class="selected-title" id="selectedTitle">画像プレビュー</p>
          <span class="selected-file" id="selectedFile">未選択</span>
        </div>
        <div class="image-box">
          <img id="puzzleImage" alt="">
          <div class="empty" id="emptyState">
            <div>
              <strong>番号を選んでください</strong>
              画像ファイルは、このHTMLと同じ場所に<br>1.jpg から 12.jpg の名前で置きます。
            </div>
          </div>
        </div>
      </aside>
    </main>
  </div>

  <script>
    const buttons = document.querySelectorAll("button[data-number]");
    const image = document.getElementById("puzzleImage");
    const emptyState = document.getElementById("emptyState");
    const selectedTitle = document.getElementById("selectedTitle");
    const selectedFile = document.getElementById("selectedFile");

    buttons.forEach((button) => {
      button.addEventListener("click", () => {
        const number = button.dataset.number;
        const difficulty = button.dataset.difficulty;
        const fileName = `${number}.jpg`;

        buttons.forEach((item) => item.classList.remove("active"));
        button.classList.add("active");

        selectedTitle.textContent = `${number}番 / ${difficulty}`;
        selectedFile.textContent = fileName;
        emptyState.style.display = "none";
        image.style.display = "block";
        image.alt = `${number}番 ${difficulty} の謎解き画像`;
        image.src = fileName;
      });
    });

    image.addEventListener("error", () => {
      image.style.display = "none";
      emptyState.style.display = "grid";
      emptyState.innerHTML = `
        <div>
          <strong>${selectedFile.textContent} が見つかりません</strong>
          このHTMLと同じ場所に画像ファイルを置くと表示されます。
        </div>
      `;
    });
  </script>
</body>
</html>
