<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title></title>
  <style>
    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      padding: 16px;
      font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: #fff8e8;
    }

    table {
      width: min(92vw, 560px);
      border-collapse: separate;
      border-spacing: 10px;
      table-layout: fixed;
    }

    button {
      width: 100%;
      aspect-ratio: 1.55;
      border: 0;
      border-radius: 8px;
      color: #262338;
      cursor: pointer;
      font: 900 clamp(2rem, 8vw, 4rem) / 1 system-ui, sans-serif;
      box-shadow: inset 0 0 0 2px rgba(38, 35, 56, 0.12);
      transition: transform 120ms ease, box-shadow 120ms ease;
    }

    th {
      padding: 0 0 2px;
      font-size: clamp(0.9rem, 3vw, 1.2rem);
      font-weight: 900;
      line-height: 1;
    }

    button:hover,
    button:focus-visible {
      transform: translateY(-2px);
      box-shadow: inset 0 0 0 4px rgba(38, 35, 56, 0.28), 0 10px 20px rgba(38, 35, 56, 0.14);
      outline: none;
    }

    .easy {
      background: #b4d800;
    }

    .easy-text {
      color: #5c7100;
    }

    .norm {
      background: #0072b2;
      color: #ffffff;
    }

    .norm-text {
      color: #0072b2;
    }

    .hell {
      background: #d62728;
      color: #ffffff;
    }

    .hell-text {
      color: #d62728;
    }

    #puzzleImage {
      display: none;
      max-width: min(92vw, 900px);
      max-height: 92vh;
      object-fit: contain;
    }
  </style>
</head>
<body>
  <table aria-label="問題選択">
    <thead>
      <tr>
        <th class="easy-text">EASY</th>
        <th class="norm-text">NORM</th>
        <th class="hell-text">HELL</th>
      </tr>
    </thead>
    <tbody>
      <tr>
        <td><button class="easy" type="button" data-file="1.jpg">1</button></td>
        <td><button class="norm" type="button" data-file="2.jpg">1</button></td>
        <td><button class="hell" type="button" data-file="3.jpg">1</button></td>
      </tr>
      <tr>
        <td><button class="easy" type="button" data-file="4.jpg">2</button></td>
        <td><button class="norm" type="button" data-file="5.jpg">2</button></td>
        <td><button class="hell" type="button" data-file="6.jpg">2</button></td>
      </tr>
      <tr>
        <td><button class="easy" type="button" data-file="7.jpg">3</button></td>
        <td><button class="norm" type="button" data-file="8.jpg">3</button></td>
        <td><button class="hell" type="button" data-file="9.jpg">3</button></td>
      </tr>
      <tr>
        <td><button class="easy" type="button" data-file="10.jpg">4</button></td>
        <td><button class="norm" type="button" data-file="11.jpg">4</button></td>
        <td><button class="hell" type="button" data-file="12.jpg">4</button></td>
      </tr>
    </tbody>
  </table>

  <img id="puzzleImage" alt="">

  <script>
    const table = document.querySelector("table");
    const image = document.getElementById("puzzleImage");

    document.querySelectorAll("button").forEach((button) => {
      button.addEventListener("click", () => {
        if (!window.confirm("表示しますか？")) {
          return;
        }

        image.src = button.dataset.file;
        image.style.display = "block";
        table.style.display = "none";
      });
    });
  </script>
</body>
</html>
